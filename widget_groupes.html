<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue groupée — Grist widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f5f4;
      --surface:      #ffffff;
      --border:       #e4e4e2;
      --border-strong:#c8c8c5;
      --text:         #18181b;
      --muted:        #71717a;
      --accent:       #2563eb;
      --group-stripe: #fafaf9;
      --hover-row:    #f0f6ff;
      --focus-ring:   0 0 0 2px rgba(37,99,235,0.35);
      --radius:       5px;
      --shadow:       0 1px 2px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
      --font:         'IBM Plex Sans', system-ui, sans-serif;
      --mono:         'IBM Plex Mono', monospace;
    }

    html, body { margin: 0; padding: 0; background: var(--bg); }

    /* #app reçoit sa hauteur par JS → scrollbar toujours correcte quelle que soit l'iframe */
    #app {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: var(--font);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      background: var(--bg);
    }

    /* ── Toolbar ─────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 36px;
    }
    .toolbar-group { display: flex; align-items: center; gap: 5px; }

    .toolbar label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      cursor: default;
    }
    .toolbar select {
      font-family: var(--font);
      font-size: 12px;
      padding: 3px 7px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
      max-width: 180px;
    }
    .toolbar select:focus-visible { border-color: var(--accent); box-shadow: var(--focus-ring); }

    .toolbar-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
    .toolbar-right { margin-left: auto; display: flex; gap: 4px; align-items: center; }

    .btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background .1s, color .1s, border-color .1s;
      outline: none;
    }
    .btn:hover         { background: var(--bg); color: var(--text); border-color: var(--muted); }
    .btn:active        { background: #e4e4e2; }
    .btn:focus-visible { box-shadow: var(--focus-ring); border-color: var(--accent); }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
      transition: background .1s, border-color .1s;
      color: var(--muted);
    }
    .btn-icon:hover         { background: var(--bg); border-color: var(--muted); color: var(--text); }
    .btn-icon.active        { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-icon:focus-visible { box-shadow: var(--focus-ring); }

    /* ── Panneau de réglages ─────────────────────────── */
    .settings-panel {
      display: none;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 18px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }
    .settings-panel.open { display: flex; }

    .setting-group { display: flex; flex-direction: column; gap: 7px; min-width: 140px; }
    .setting-group-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Palettes */
    .palette-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .palette-btn {
      display: flex;
      gap: 2px;
      padding: 3px 5px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--bg);
      outline: none;
      transition: border-color .1s;
    }
    .palette-btn:hover         { border-color: var(--muted); }
    .palette-btn.selected      { border-color: var(--accent); }
    .palette-btn:focus-visible { box-shadow: var(--focus-ring); }
    .palette-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Format booléens */
    .bool-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .bool-btn {
      font-family: var(--font);
      font-size: 11px;
      padding: 2px 9px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      outline: none;
      transition: background .1s, border-color .1s, color .1s;
    }
    .bool-btn:hover         { border-color: var(--muted); color: var(--text); }
    .bool-btn.selected      { background: var(--accent); border-color: var(--accent); color: #fff; }
    .bool-btn:focus-visible { box-shadow: var(--focus-ring); }

    /* ── Stats bar ──────────────────────────────────── */
    .statsbar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 4px 10px;
      background: var(--group-stripe);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
    }
    .statsbar.visible { display: flex; }
    .stat-val { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

    /* ── Zone de contenu / scroll ───────────────────── */
    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) var(--bg);
    }
    .content::-webkit-scrollbar       { width: 8px; }
    .content::-webkit-scrollbar-track { background: var(--bg); border-radius: 4px; }
    .content::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 4px;
      border: 2px solid var(--bg);
    }
    .content::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }
    .empty svg   { opacity: .25; }
    .empty-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .empty-sub   { font-size: 12px; }

    /* ── Groupe ──────────────────────────────────────── */
    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      user-select: none;
      transition: background .1s;
      outline: none;
    }
    .group-header:hover         { background: var(--bg); }
    .group-header:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }

    .chevron {
      width: 14px; height: 14px; flex-shrink: 0; color: var(--muted);
      transition: transform .2s cubic-bezier(.4,0,.2,1);
    }
    .group.collapsed .chevron { transform: rotate(-90deg); }

    .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .group-label {
      font-size: 13px; font-weight: 600; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .group-label.is-empty { font-weight: 400; font-style: italic; color: var(--muted); }

    .group-badge {
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      padding: 1px 7px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border); color: var(--muted); flex-shrink: 0;
    }

    .group-body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows .22s cubic-bezier(.4,0,.2,1);
      border-top: 1px solid var(--border);
    }
    .group.collapsed .group-body { grid-template-rows: 0fr; border-top-color: transparent; }
    .group-body-inner { overflow: hidden; }

    /* ── Tableau ─────────────────────────────────────── */
    .rec-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .rec-table caption {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .rec-table thead th {
      font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--muted);
      letter-spacing: .03em; padding: 4px 10px; text-align: left;
      background: var(--group-stripe); border-bottom: 1px solid var(--border);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
    }
    .rec-table tbody tr          { transition: background .08s; }
    .rec-table tbody tr:hover td { background: var(--hover-row); }
    .rec-table tbody td {
      padding: 5px 10px; border-bottom: 1px solid var(--border); color: var(--text);
      max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .rec-table tbody tr:last-child td { border-bottom: none; }

    .cell-null { color: var(--muted); font-style: italic; font-size: 11px; }
    .cell-num  { font-family: var(--mono); font-size: 11px; }
    .cell-bool-t { font-weight: 500; }

    .only-group-col {
      padding: 8px 12px; font-size: 11px; color: var(--muted); font-style: italic;
    }
  </style>
</head>
<body>
<div id="app">

  <header class="toolbar" role="toolbar" aria-label="Options de groupement">

    <div class="toolbar-group">
      <label for="group-select">Grouper par</label>
      <select id="group-select">
        <option value="">— choisir —</option>
      </select>
    </div>

    <div class="toolbar-sep" role="separator" aria-orientation="vertical"></div>

    <div class="toolbar-group">
      <label for="sort-select">Tri</label>
      <select id="sort-select">
        <option value="alpha-asc">A → Z</option>
        <option value="alpha-desc">Z → A</option>
        <option value="count-desc">Nb ↓</option>
        <option value="count-asc">Nb ↑</option>
      </select>
    </div>

    <div class="toolbar-right">
      <button class="btn" id="btn-expand"   type="button">Tout déplier</button>
      <button class="btn" id="btn-collapse" type="button">Tout plier</button>
      <div class="toolbar-sep" role="separator" aria-orientation="vertical"></div>
      <button class="btn-icon" id="btn-settings" type="button"
              aria-label="Réglages d'affichage" aria-expanded="false" aria-controls="settings-panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

  </header>

  <!-- Panneau de réglages -->
  <div class="settings-panel" id="settings-panel"
       role="region" aria-label="Réglages d'affichage">

    <div class="setting-group">
      <p class="setting-group-title" id="lbl-palette">Palette de couleurs</p>
      <div class="palette-row" id="palette-row"
           role="radiogroup" aria-labelledby="lbl-palette"></div>
    </div>

    <div class="setting-group">
      <p class="setting-group-title" id="lbl-bool">Affichage vrai / faux</p>
      <div class="bool-row" id="bool-row"
           role="radiogroup" aria-labelledby="lbl-bool"></div>
    </div>

  </div>

  <div class="statsbar" id="statsbar" role="status" aria-live="polite" aria-atomic="true">
    <span><span class="stat-val" id="stat-groups">0</span> groupes</span>
    <span aria-hidden="true">·</span>
    <span><span class="stat-val" id="stat-records">0</span> enregistrements</span>
  </div>

  <main class="content" id="content" aria-label="Groupes d'enregistrements">

    <div class="empty" id="empty-state" role="status">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.2"
           aria-hidden="true" focusable="false">
        <rect x="3" y="3" width="18" height="18" rx="2.5"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <p class="empty-title">Aucune colonne sélectionnée</p>
      <p class="empty-sub">Choisis une colonne dans la barre ci-dessus<br>pour grouper les enregistrements.</p>
    </div>

  </main>

</div><!-- #app -->

<script>
  // ── Constantes ─────────────────────────────────────────

  const PALETTES = {
    vif:     { label: 'Vif',      colors: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'] },
    pastel:  { label: 'Pastel',   colors: ['#93c5fd','#6ee7b7','#fde68a','#fca5a5','#c4b5fd','#f9a8d4','#67e8f9','#d9f99d','#fdba74','#a5b4fc'] },
    terre:   { label: 'Terre',    colors: ['#92400e','#065f46','#78350f','#7f1d1d','#3b0764','#831843','#164e63','#365314','#7c2d12','#1e1b4b'] },
    mono:    { label: 'Mono',     colors: ['#18181b','#3f3f46','#71717a','#a1a1aa','#d4d4d8','#e4e4e7','#18181b','#3f3f46','#71717a','#a1a1aa'] },
  };

  const BOOL_FORMATS = [
    { key: 'check',   label: '✓ / ✗',         trueHtml: '<span class="cell-bool-t" style="color:#16a34a">✓ vrai</span>',  falseHtml: '<span style="color:#dc2626">✗ faux</span>' },
    { key: 'oui',     label: 'Oui / Non',      trueHtml: '<span class="cell-bool-t" style="color:#16a34a">Oui</span>',     falseHtml: '<span style="color:#dc2626">Non</span>' },
    { key: 'tf',      label: 'True / False',   trueHtml: '<span class="cell-bool-t" style="color:#16a34a">True</span>',    falseHtml: '<span style="color:#dc2626">False</span>' },
    { key: 'badge',   label: '● badge',        trueHtml: '<span style="display:inline-block;padding:1px 7px;border-radius:9px;background:#dcfce7;color:#166534;font-size:10px;font-weight:600">vrai</span>', falseHtml: '<span style="display:inline-block;padding:1px 7px;border-radius:9px;background:#fee2e2;color:#991b1b;font-size:10px;font-weight:600">faux</span>' },
    { key: 'plain',   label: '1 / 0',          trueHtml: '<span class="cell-num">1</span>',                                falseHtml: '<span class="cell-num cell-null">0</span>' },
  ];

  // ── État ───────────────────────────────────────────────
  let allRecords  = [];
  let allColumns  = [];
  let groupBy     = '';
  let sortMode    = 'alpha-asc';
  let collapsed   = new Set();
  let colColors   = {};
  let paletteKey  = 'vif';
  let boolFmtKey  = 'check';
  let paletteIdx  = 0;

  // ── Refs DOM ───────────────────────────────────────────
  const app         = document.getElementById('app');
  const groupSelect = document.getElementById('group-select');
  const sortSelect  = document.getElementById('sort-select');
  const content     = document.getElementById('content');
  const statsbar    = document.getElementById('statsbar');
  const statGroups  = document.getElementById('stat-groups');
  const statRecords = document.getElementById('stat-records');
  const emptyState  = document.getElementById('empty-state');
  const settingsPanel = document.getElementById('settings-panel');
  const btnSettings   = document.getElementById('btn-settings');

  // ── Hauteur par JS — fiable dans toute iframe ──────────
  function setAppHeight() {
    app.style.height = window.innerHeight + 'px';
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);

  // ── Construction du panneau de réglages ────────────────
  function buildSettingsPanel() {
    // Palettes
    const paletteRow = document.getElementById('palette-row');
    Object.entries(PALETTES).forEach(([key, pal]) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'palette-btn' + (key === paletteKey ? ' selected' : '');
      btn.setAttribute('role', 'radio');
      btn.setAttribute('aria-checked', String(key === paletteKey));
      btn.setAttribute('aria-label', 'Palette ' + pal.label);
      btn.title = pal.label;
      pal.colors.slice(0, 5).forEach(c => {
        const dot = document.createElement('span');
        dot.className = 'palette-dot';
        dot.style.background = c;
        dot.setAttribute('aria-hidden', 'true');
        btn.appendChild(dot);
      });
      btn.addEventListener('click', () => {
        paletteKey = key;
        colColors  = {};
        paletteIdx = 0;
        paletteRow.querySelectorAll('.palette-btn').forEach(b => {
          b.classList.remove('selected');
          b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('selected');
        btn.setAttribute('aria-checked', 'true');
        grist.setOption('paletteKey', paletteKey);
        render();
      });
      paletteRow.appendChild(btn);
    });

    // Formats booléens
    const boolRow = document.getElementById('bool-row');
    BOOL_FORMATS.forEach(fmt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'bool-btn' + (fmt.key === boolFmtKey ? ' selected' : '');
      btn.setAttribute('role', 'radio');
      btn.setAttribute('aria-checked', String(fmt.key === boolFmtKey));
      btn.setAttribute('aria-label', 'Format : ' + fmt.label);
      btn.textContent = fmt.label;
      btn.addEventListener('click', () => {
        boolFmtKey = fmt.key;
        boolRow.querySelectorAll('.bool-btn').forEach(b => {
          b.classList.remove('selected');
          b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('selected');
        btn.setAttribute('aria-checked', 'true');
        grist.setOption('boolFmtKey', boolFmtKey);
        render();
      });
      boolRow.appendChild(btn);
    });
  }

  // ── Bouton réglages ────────────────────────────────────
  btnSettings.addEventListener('click', () => {
    const isOpen = settingsPanel.classList.toggle('open');
    btnSettings.classList.toggle('active', isOpen);
    btnSettings.setAttribute('aria-expanded', String(isOpen));
  });

  // ── Grist ──────────────────────────────────────────────
  grist.ready({ requiredAccess: 'read table' });

  grist.onOptions((opts) => {
    if (!opts) return;
    if (opts.groupBy)    { groupBy   = opts.groupBy;   groupSelect.value = groupBy;  }
    if (opts.sortMode)   { sortMode  = opts.sortMode;  sortSelect.value  = sortMode; }
    if (opts.paletteKey && PALETTES[opts.paletteKey])  paletteKey = opts.paletteKey;
    if (opts.boolFmtKey && BOOL_FORMATS.find(f => f.key === opts.boolFmtKey))
      boolFmtKey = opts.boolFmtKey;
    buildSettingsPanel();
    render();
  });

  grist.onRecords((records) => {
    allRecords = records || [];
    if (allRecords.length > 0) {
      allColumns = Object.keys(allRecords[0])
        .filter(k => k !== 'id' && k !== 'manualSort');
      rebuildColumnSelect();
    }
    render();
  });

  // Premier appel si onOptions n'est pas déclenché
  buildSettingsPanel();

  // ── Sélecteur de colonne ───────────────────────────────
  function rebuildColumnSelect() {
    const prev = groupSelect.value;
    groupSelect.innerHTML = '<option value="">— choisir —</option>';
    allColumns.forEach(col => {
      const opt = document.createElement('option');
      opt.value = col;
      opt.textContent = col;
      groupSelect.appendChild(opt);
    });
    const target = groupBy || prev;
    if (target && allColumns.includes(target)) groupSelect.value = target;
  }

  groupSelect.addEventListener('change', () => {
    groupBy    = groupSelect.value;
    collapsed.clear();
    colColors  = {};
    paletteIdx = 0;
    grist.setOption('groupBy', groupBy);
    render();
  });

  sortSelect.addEventListener('change', () => {
    sortMode = sortSelect.value;
    grist.setOption('sortMode', sortMode);
    render();
  });

  document.getElementById('btn-expand').addEventListener('click', () => {
    collapsed.clear();
    document.querySelectorAll('.group.collapsed').forEach(el => {
      el.classList.remove('collapsed');
      el.querySelector('.group-header').setAttribute('aria-expanded', 'true');
    });
  });

  document.getElementById('btn-collapse').addEventListener('click', () => {
    getGroups().forEach(g => collapsed.add(g.key));
    document.querySelectorAll('.group:not(.collapsed)').forEach(el => {
      el.classList.add('collapsed');
      el.querySelector('.group-header').setAttribute('aria-expanded', 'false');
    });
  });

  // ── Groupement ─────────────────────────────────────────
  function getGroups() {
    if (!groupBy) return [];
    const map = new Map();
    allRecords.forEach(rec => {
      const raw = rec[groupBy];
      const key = (raw == null || raw === '') ? '\x00__empty__' : String(raw);
      if (!map.has(key)) map.set(key, { key, label: raw, records: [] });
      map.get(key).records.push(rec);
    });
    const groups = Array.from(map.values());

    const palette = PALETTES[paletteKey].colors;
    groups.forEach(g => {
      if (!colColors[g.key]) colColors[g.key] = palette[paletteIdx++ % palette.length];
    });

    groups.sort((a, b) => {
      if (a.key === '\x00__empty__') return  1;
      if (b.key === '\x00__empty__') return -1;
      if (sortMode === 'alpha-asc')  return String(a.label).localeCompare(String(b.label), 'fr');
      if (sortMode === 'alpha-desc') return String(b.label).localeCompare(String(a.label), 'fr');
      if (sortMode === 'count-desc') return b.records.length - a.records.length;
      if (sortMode === 'count-asc')  return a.records.length - b.records.length;
      return 0;
    });
    return groups;
  }

  // ── Rendu ──────────────────────────────────────────────
  function render() {
    Array.from(content.children).forEach(c => {
      if (c.id !== 'empty-state') c.remove();
    });

    if (!groupBy || allRecords.length === 0) {
      emptyState.style.display = '';
      emptyState.querySelector('.empty-title').textContent =
        !groupBy ? 'Aucune colonne sélectionnée' : 'Aucun enregistrement';
      emptyState.querySelector('.empty-sub').innerHTML =
        !groupBy
          ? 'Choisis une colonne dans la barre ci-dessus<br>pour grouper les enregistrements.'
          : 'La table sélectionnée ne contient aucun enregistrement.';
      statsbar.classList.remove('visible');
      return;
    }

    emptyState.style.display = 'none';
    const groups      = getGroups();
    const displayCols = allColumns.filter(c => c !== groupBy);

    statsbar.classList.add('visible');
    statGroups.textContent  = groups.length;
    statRecords.textContent = allRecords.length;

    groups.forEach(group => {
      const isCollapsed = collapsed.has(group.key);
      const isEmpty     = group.key === '\x00__empty__';
      const dotColor    = colColors[group.key] || '#94a3b8';
      const labelTxt    = isEmpty ? '(vide)' : esc(String(group.label));
      const labelCls    = isEmpty ? 'group-label is-empty' : 'group-label';
      const bodyId      = 'grp-' + btoa(encodeURIComponent(group.key)).replace(/[^a-zA-Z0-9]/g, '');

      const card = document.createElement('article');
      card.className = 'group' + (isCollapsed ? ' collapsed' : '');

      const header = document.createElement('button');
      header.type = 'button';
      header.className = 'group-header';
      header.setAttribute('aria-expanded', String(!isCollapsed));
      header.setAttribute('aria-controls', bodyId);
      header.innerHTML = `
        <svg class="chevron" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true" focusable="false">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <span class="group-dot" style="background:${dotColor}" aria-hidden="true"></span>
        <span class="${labelCls}">${labelTxt}</span>
        <span class="group-badge"
              aria-label="${group.records.length} enregistrement${group.records.length > 1 ? 's' : ''}"
        >${group.records.length}</span>`;

      header.addEventListener('click', () => {
        if (collapsed.has(group.key)) {
          collapsed.delete(group.key);
          card.classList.remove('collapsed');
          header.setAttribute('aria-expanded', 'true');
        } else {
          collapsed.add(group.key);
          card.classList.add('collapsed');
          header.setAttribute('aria-expanded', 'false');
        }
      });

      const body = document.createElement('div');
      body.className = 'group-body';
      body.id = bodyId;
      body.setAttribute('role', 'region');
      body.setAttribute('aria-label', 'Enregistrements — ' + labelTxt);

      const inner = document.createElement('div');
      inner.className = 'group-body-inner';
      inner.innerHTML = displayCols.length === 0
        ? '<p class="only-group-col">Aucune autre colonne à afficher.</p>'
        : buildTable(displayCols, group.records, labelTxt);

      body.appendChild(inner);
      card.appendChild(header);
      card.appendChild(body);
      content.appendChild(card);
    });
  }

  function buildTable(cols, records, groupLabel) {
    const thead = cols.map(c =>
      `<th scope="col" title="${esc(c)}">${esc(c)}</th>`
    ).join('');
    const tbody = records.map(rec =>
      `<tr>${cols.map(c => `<td>${renderCell(rec[c])}</td>`).join('')}</tr>`
    ).join('');
    return `<table class="rec-table">
      <caption>Groupe : ${esc(groupLabel)}</caption>
      <thead><tr>${thead}</tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
  }

  function renderCell(val) {
    if (val == null || val === '')
      return '<span class="cell-null" aria-label="valeur vide">—</span>';
    if (val === true || val === false) {
      const fmt = BOOL_FORMATS.find(f => f.key === boolFmtKey) || BOOL_FORMATS[0];
      return val ? fmt.trueHtml : fmt.falseHtml;
    }
    if (typeof val === 'number') {
      const isYearLike = Number.isInteger(val) && val >= 1000 && val <= 9999;
      return `<span class="cell-num">${isYearLike ? val : val.toLocaleString('fr-FR')}</span>`;
    }
    if (Array.isArray(val)) return esc(val.join(', '));
    return esc(String(val));
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
