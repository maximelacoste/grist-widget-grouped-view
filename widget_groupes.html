<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue groupée</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f5f4;
      --surface:      #ffffff;
      --border:       #e4e4e2;
      --border-strong:#c8c8c5;
      --text:         #18181b;
      --muted:        #71717a;
      --accent:       #2563eb;
      --accent-bg:    #eff6ff;
      --group-stripe: #fafaf9;
      --hover-row:    #f0f6ff;
      --radius:       5px;
      --shadow:       0 1px 2px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      --font:         'IBM Plex Sans', system-ui, sans-serif;
      --mono:         'IBM Plex Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 36px;
    }

    .toolbar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar select {
      font-family: var(--font);
      font-size: 12px;
      padding: 3px 7px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
      max-width: 180px;
    }
    .toolbar select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37,99,235,0.14);
    }

    .toolbar-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
    }

    .toolbar-right { margin-left: auto; display: flex; gap: 4px; }

    .btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .btn:hover { background: var(--bg); color: var(--text); border-color: var(--muted); }
    .btn:active { background: #e4e4e2; }

    /* ── Stats bar ── */
    .statsbar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 4px 10px;
      background: var(--group-stripe);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
    }
    .statsbar.visible { display: flex; }
    .stat-val { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

    /* ── Content area ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }
    .empty svg { opacity: 0.25; }
    .empty-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .empty-sub { font-size: 12px; }

    /* ── Group card ── */
    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .group-header:hover { background: var(--bg); }

    .chevron {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--muted);
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .group.collapsed .chevron { transform: rotate(-90deg); }

    .group-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .group-label {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .group-label.is-empty {
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
    }

    .group-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Group body / table ── */
    .group-body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.22s cubic-bezier(0.4,0,0.2,1);
      border-top: 1px solid var(--border);
    }
    .group.collapsed .group-body {
      grid-template-rows: 0fr;
      border-top-color: transparent;
    }
    .group-body-inner { overflow: hidden; }

    .rec-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .rec-table thead th {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.03em;
      padding: 4px 10px;
      text-align: left;
      background: var(--group-stripe);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .rec-table tbody tr { transition: background 0.08s; }
    .rec-table tbody tr:hover td { background: var(--hover-row); }
    .rec-table tbody td {
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rec-table tbody tr:last-child td { border-bottom: none; }

    .cell-null { color: var(--muted); font-style: italic; font-size: 11px; }
    .cell-bool-t { color: #16a34a; font-weight: 500; }
    .cell-bool-f { color: #dc2626; }
    .cell-num { font-family: var(--mono); font-size: 11px; }

    /* ── Only-one-col note ── */
    .only-group-col {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Sort toggle ── */
    #sort-select {
      font-family: var(--font);
      font-size: 11px;
      padding: 2px 5px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      outline: none;
    }
    #sort-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,0.14); }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-label">Grouper par</span>
  <select id="group-select">
    <option value="">— choisir —</option>
  </select>
  <div class="toolbar-sep"></div>
  <span class="toolbar-label">Tri</span>
  <select id="sort-select">
    <option value="alpha-asc">A → Z</option>
    <option value="alpha-desc">Z → A</option>
    <option value="count-desc">Nb ↓</option>
    <option value="count-asc">Nb ↑</option>
  </select>
  <div class="toolbar-right">
    <button class="btn" id="btn-expand">Tout déplier</button>
    <button class="btn" id="btn-collapse">Tout plier</button>
  </div>
</div>

<div class="statsbar" id="statsbar">
  <span><span class="stat-val" id="stat-groups">0</span> groupes</span>
  <span>·</span>
  <span><span class="stat-val" id="stat-records">0</span> enregistrements</span>
</div>

<div class="content" id="content">
  <div class="empty" id="empty-state">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="3" y="3" width="18" height="18" rx="2.5"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    <div class="empty-title">Aucune colonne sélectionnée</div>
    <div class="empty-sub">Choisis une colonne dans la barre ci-dessus<br>pour grouper les enregistrements.</div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let allRecords = [];
  let allColumns = [];
  let groupBy    = '';
  let sortMode   = 'alpha-asc';
  let collapsed  = new Set();   // set of group keys currently collapsed
  let colColors  = {};          // stable colors per group key

  const PALETTE = [
    '#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6',
    '#ec4899','#06b6d4','#84cc16','#f97316','#6366f1',
  ];
  let paletteIdx = 0;

  // ── DOM refs ───────────────────────────────────────────
  const groupSelect = document.getElementById('group-select');
  const sortSelect  = document.getElementById('sort-select');
  const content     = document.getElementById('content');
  const statsbar    = document.getElementById('statsbar');
  const statGroups  = document.getElementById('stat-groups');
  const statRecords = document.getElementById('stat-records');
  const emptyState  = document.getElementById('empty-state');

  // ── Données de démonstration (actives hors Grist) ────
  const DEMO_RECORDS = [
    { id:1,  Élève:'Amara Diallo',     Secteur:'Nord',   Statut:'En attente',  Orientation:'SEGPA',   Établissement:'CLG Victor Hugo',    Année:2025, Prioritaire:true  },
    { id:2,  Élève:'Lucas Martin',     Secteur:'Sud',    Statut:'Validé',      Orientation:'ULIS',    Établissement:'CLG Clémence Isaure', Année:2025, Prioritaire:false },
    { id:3,  Élève:'Inès Bensalah',    Secteur:'Nord',   Statut:'Validé',      Orientation:'SEGPA',   Établissement:'CLG Victor Hugo',    Année:2025, Prioritaire:true  },
    { id:4,  Élève:'Tom Chevalier',    Secteur:'Est',    Statut:'En attente',  Orientation:'ULIS',    Établissement:'CLG Jean Jaurès',    Année:2025, Prioritaire:false },
    { id:5,  Élève:'Fatou Traoré',     Secteur:'Ouest',  Statut:'Refusé',      Orientation:'SEGPA',   Établissement:'CLG des Minimes',    Année:2025, Prioritaire:true  },
    { id:6,  Élève:'Mathieu Perez',    Secteur:'Sud',    Statut:'Validé',      Orientation:'SEGPA',   Établissement:'CLG Clémence Isaure', Année:2025, Prioritaire:false },
    { id:7,  Élève:'Camille Roy',      Secteur:'Nord',   Statut:'En attente',  Orientation:'IME',     Établissement:'CLG Victor Hugo',    Année:2024, Prioritaire:false },
    { id:8,  Élève:'Nour El Amine',    Secteur:'Est',    Statut:'Validé',      Orientation:'SEGPA',   Établissement:'CLG Jean Jaurès',    Année:2025, Prioritaire:true  },
    { id:9,  Élève:'Zoé Fontaine',     Secteur:'Ouest',  Statut:'Validé',      Orientation:'ULIS',    Établissement:'CLG des Minimes',    Année:2024, Prioritaire:false },
    { id:10, Élève:'Raphaël Bouvet',   Secteur:'Centre', Statut:'En attente',  Orientation:'SEGPA',   Établissement:'CLG Fermat',         Année:2025, Prioritaire:false },
    { id:11, Élève:'Salma Ounis',      Secteur:'Centre', Statut:'Validé',      Orientation:'IME',     Établissement:'CLG Fermat',         Année:2025, Prioritaire:true  },
    { id:12, Élève:'Hugo Lefebvre',    Secteur:'Sud',    Statut:'Refusé',      Orientation:'ULIS',    Établissement:'CLG Clémence Isaure', Année:2024, Prioritaire:false },
    { id:13, Élève:'Maëva Garnier',    Secteur:'Nord',   Statut:'Validé',      Orientation:'SEGPA',   Établissement:'CLG Victor Hugo',    Année:2025, Prioritaire:false },
    { id:14, Élève:'Yanis Hamidi',     Secteur:'Est',    Statut:'En attente',  Orientation:'IME',     Établissement:'CLG Jean Jaurès',    Année:2025, Prioritaire:true  },
    { id:15, Élève:'Chloé Bernard',    Secteur:'Centre', Statut:'Validé',      Orientation:'SEGPA',   Établissement:'CLG Fermat',         Année:2024, Prioritaire:false },
    { id:16, Élève:'Adam Sow',         Secteur:'Ouest',  Statut:'En attente',  Orientation:'SEGPA',   Établissement:'CLG des Minimes',    Année:2025, Prioritaire:true  },
    { id:17, Élève:'Léa Moreau',       Secteur:'Sud',    Statut:'Validé',      Orientation:'ULIS',    Établissement:'CLG Clémence Isaure', Année:2025, Prioritaire:false },
    { id:18, Élève:'Bilal Essid',      Secteur:'Centre', Statut:'Refusé',      Orientation:'SEGPA',   Établissement:'CLG Fermat',         Année:2025, Prioritaire:false },
    { id:19, Élève:'Emma Vasseur',     Secteur:'Nord',   Statut:'Validé',      Orientation:'ULIS',    Établissement:'CLG Victor Hugo',    Année:2024, Prioritaire:true  },
    { id:20, Élève:'Maxence Dupuy',    Secteur:'Est',    Statut:'Validé',      Orientation:'SEGPA',   Établissement:'CLG Jean Jaurès',    Année:2025, Prioritaire:false },
    { id:21, Élève:'Sirine Belhadj',   Secteur:'',       Statut:'En attente',  Orientation:'SEGPA',   Établissement:'CLG Victor Hugo',    Année:2025, Prioritaire:false },
  ];

  // Détecte si on est dans Grist (iframe) ou en standalone
  const IS_DEMO = (window.self === window.top);

  function startDemo() {
    const demoBanner = document.createElement('div');
    demoBanner.style.cssText = `
      background:#fef9c3;border-bottom:1px solid #fde68a;padding:4px 10px;
      font-size:11px;color:#92400e;display:flex;align-items:center;gap:6px;flex-shrink:0;
    `;
    demoBanner.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      Mode démo — données fictives CDOEA · Dans Grist, le widget lira ta vraie table.`;
    document.body.insertBefore(demoBanner, document.querySelector('.toolbar'));

    allRecords = DEMO_RECORDS;
    allColumns = Object.keys(DEMO_RECORDS[0]).filter(k => k !== 'id');
    groupBy = 'Secteur';
    rebuildColumnSelect();
    groupSelect.value = groupBy;
    render();
  }

  // ── Grist ─────────────────────────────────────────────
  grist.ready({ requiredAccess: 'read table' });

  if (IS_DEMO) { setTimeout(startDemo, 200); }

  grist.onOptions((opts) => {
    if (!opts) return;
    if (opts.groupBy) {
      groupBy = opts.groupBy;
      groupSelect.value = groupBy;
    }
    if (opts.sortMode) {
      sortMode = opts.sortMode;
      sortSelect.value = sortMode;
    }
    render();
  });

  grist.onRecords((records) => {
    allRecords = records || [];
    if (allRecords.length > 0) {
      allColumns = Object.keys(allRecords[0])
        .filter(k => k !== 'id' && k !== 'manualSort');
      rebuildColumnSelect();
    }
    render();
  });

  // ── Column select ──────────────────────────────────────
  function rebuildColumnSelect() {
    const prev = groupSelect.value;
    groupSelect.innerHTML = '<option value="">— choisir —</option>';
    allColumns.forEach(col => {
      const opt = document.createElement('option');
      opt.value = col;
      opt.textContent = col;
      groupSelect.appendChild(opt);
    });
    const target = groupBy || prev;
    if (target && allColumns.includes(target)) groupSelect.value = target;
  }

  groupSelect.addEventListener('change', () => {
    groupBy = groupSelect.value;
    collapsed.clear();
    colColors  = {};
    paletteIdx = 0;
    grist.setOption('groupBy', groupBy);
    render();
  });

  sortSelect.addEventListener('change', () => {
    sortMode = sortSelect.value;
    grist.setOption('sortMode', sortMode);
    render();
  });

  document.getElementById('btn-expand').addEventListener('click', () => {
    collapsed.clear();
    document.querySelectorAll('.group.collapsed').forEach(el => el.classList.remove('collapsed'));
  });

  document.getElementById('btn-collapse').addEventListener('click', () => {
    getGroups().forEach(g => collapsed.add(g.key));
    document.querySelectorAll('.group:not(.collapsed)').forEach(el => el.classList.add('collapsed'));
  });

  // ── Grouping logic ─────────────────────────────────────
  function getGroups() {
    if (!groupBy) return [];
    const map = new Map();
    allRecords.forEach(rec => {
      const raw = rec[groupBy];
      const key = (raw == null || raw === '') ? '\x00__empty__' : String(raw);
      if (!map.has(key)) map.set(key, { key, label: raw, records: [] });
      map.get(key).records.push(rec);
    });
    let groups = Array.from(map.values());

    // Ensure stable colors
    groups.forEach(g => {
      if (!colColors[g.key]) {
        colColors[g.key] = PALETTE[paletteIdx++ % PALETTE.length];
      }
    });

    groups.sort((a, b) => {
      if (a.key === '\x00__empty__') return 1;
      if (b.key === '\x00__empty__') return -1;
      if (sortMode === 'alpha-asc')  return String(a.label).localeCompare(String(b.label), 'fr');
      if (sortMode === 'alpha-desc') return String(b.label).localeCompare(String(a.label), 'fr');
      if (sortMode === 'count-desc') return b.records.length - a.records.length;
      if (sortMode === 'count-asc')  return a.records.length - b.records.length;
      return 0;
    });
    return groups;
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    // Clear non-empty-state children
    Array.from(content.children).forEach(c => {
      if (c.id !== 'empty-state') c.remove();
    });

    if (!groupBy || allRecords.length === 0) {
      emptyState.style.display = '';
      emptyState.querySelector('.empty-title').textContent =
        !groupBy ? 'Aucune colonne sélectionnée' : 'Aucun enregistrement';
      emptyState.querySelector('.empty-sub').textContent =
        !groupBy
          ? 'Choisis une colonne dans la barre ci-dessus\npour grouper les enregistrements.'
          : 'La table sélectionnée ne contient aucun enregistrement.';
      statsbar.classList.remove('visible');
      return;
    }

    emptyState.style.display = 'none';
    const groups    = getGroups();
    const displayCols = allColumns.filter(c => c !== groupBy);

    statsbar.classList.add('visible');
    statGroups.textContent  = groups.length;
    statRecords.textContent = allRecords.length;

    groups.forEach(group => {
      const card = document.createElement('div');
      card.className = 'group' + (collapsed.has(group.key) ? ' collapsed' : '');

      const isEmpty  = group.key === '\x00__empty__';
      const dotColor = colColors[group.key] || '#94a3b8';
      const labelCls = isEmpty ? 'group-label is-empty' : 'group-label';
      const labelTxt = isEmpty ? '(vide)' : esc(String(group.label));

      card.innerHTML = `
        <div class="group-header">
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span class="group-dot" style="background:${dotColor}"></span>
          <span class="${labelCls}">${labelTxt}</span>
          <span class="group-badge">${group.records.length}</span>
        </div>
        <div class="group-body">
          <div class="group-body-inner">
            ${displayCols.length === 0
              ? `<div class="only-group-col">Aucune autre colonne à afficher.</div>`
              : buildTable(displayCols, group.records)
            }
          </div>
        </div>`;

      card.querySelector('.group-header').addEventListener('click', () => {
        if (collapsed.has(group.key)) {
          collapsed.delete(group.key);
          card.classList.remove('collapsed');
        } else {
          collapsed.add(group.key);
          card.classList.add('collapsed');
        }
      });

      content.appendChild(card);
    });
  }

  function buildTable(cols, records) {
    const thead = cols.map(c =>
      `<th title="${esc(c)}">${esc(c)}</th>`
    ).join('');
    const tbody = records.map(rec =>
      `<tr>${cols.map(c => `<td>${renderCell(rec[c])}</td>`).join('')}</tr>`
    ).join('');
    return `<table class="rec-table">
      <thead><tr>${thead}</tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
  }

  function renderCell(val) {
    if (val == null || val === '') return '<span class="cell-null">—</span>';
    if (val === true)  return '<span class="cell-bool-t">✓ vrai</span>';
    if (val === false) return '<span class="cell-bool-f">✗ faux</span>';
    if (typeof val === 'number') return `<span class="cell-num">${val.toLocaleString('fr-FR')}</span>`;
    if (Array.isArray(val)) return esc(val.join(', '));
    return esc(String(val));
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
